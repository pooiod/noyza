<!doctype html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Loading...</title>
  <style>
    body, html {
      margin: 0;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    svg#loader-svg {
      width: 200px;
      height: 200px;
      opacity: 0;
      transform: scale(0.6) rotate(-30deg);
      animation: enter 1.2s ease forwards;
    }

    circle#circle-loader {
      stroke: url(#grad);
      stroke-width: 8;
      fill: none;
      stroke-linecap: round;
      transform-origin: 100px 100px;
      animation: loaderSpin 2s linear infinite;
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes loaderSpin {
      100% {
        transform: rotate(360deg);
      }
    }

    #n-circle {
      fill: #1A1A1A;
      stroke: #1A1A1A;
    }

    #error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      max-width: 400px;
      animation: enter 0.5s ease forwards;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
    }

    #error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ff3d6d;
    }

    #error-message {
      color: #aaaaaa;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 1.5rem;
      word-break: break-word;
    }

    .retry-btn {
      background: linear-gradient(135deg, #ff3d6d 0%, #6a0dad 100%);
      border: none;
      color: white;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .retry-btn:hover {
      transform: scale(1.05);
    }

    .retry-btn:active {
      transform: scale(0.98);
    }

    @media (prefers-color-scheme: light) {
      body, html {
        background: #ffffff;
      }
      #n-circle {
        fill: #ffffff;
        stroke: #e5e5e5;
      }
      #error-message {
        color: #555555;
      }
    }
  </style>
</head>
<body>

  <svg id="loader-svg" width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#FF3D6D"/>
        <stop offset="100%" stop-color="#6A0DAD"/>
      </linearGradient>
    </defs>
    <circle cx="100" cy="100" r="80" id="n-circle" stroke-width="8"/>
    <circle id="circle-loader" cx="100" cy="100" r="80"/>
  </svg>

  <div id="error-container">
    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="#ff3d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="15" y1="9" x2="9" y2="15"></line>
      <line x1="9" y1="9" x2="15" y2="15"></line>
    </svg>
    <div id="error-title">Initialization Failed</div>
    <div id="error-message">Unable to start service worker.</div>
    <button class="retry-btn" onclick="window.location.reload()">Retry</button>
  </div>

  <script>
    if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist();
    }

    let ok = false;
    let hasError = false;

    function showError(msg) {
      hasError = true;
      document.getElementById('loader-svg').style.display = 'none';
      document.getElementById('error-message').innerText = msg;
      document.getElementById('error-container').style.display = 'flex';
    }

    setTimeout(() => { 
      if (!ok) {
        showError("Unable to start service worker");
      }
    }, 1200);

    setTimeout(() => {
      if (!hasError) {
        window.location.reload();
      }
    }, 10000);

    navigator.serviceWorker.register('/sw.js').then(r => {
      navigator.serviceWorker.ready.then(() => { ok = true; }).catch(err => {
        showError("Service worker initialization error: " + err.message);
      });
    }).catch(err => {
      showError("Failed to register service worker: " + err.message);
    });

    async function check() {
      try {
        const r = await navigator.serviceWorker.ready;
        if (r && r.active) {
          r.active.postMessage({ type: 'status' });
        }
      } catch (err) {
        showError("Failed to verify service worker state: " + err.message);
      }
    }

    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data.type === 'status') {
        if (!e.data.hasFiles) {
          location.href = '/update';
        }
      }
    });

    check();
  </script>
</body>
</html>
