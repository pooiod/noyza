<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noyza - Discover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link id="theme-stylesheet" rel="stylesheet" href="/themes/serenity.css">
</head>
<body data-theme-mode="light">
<div class="app-layout">
  <aside class="sidebar-container">
    {{/components/sidebar.html}}
  </aside>
  <main class="main-content">
    <div class="discover-top-bar">
      <div class="search-bar-container">
        <input type="text" id="search-input" class="custom-input" placeholder="Search tracks or from:artist...">
        <button class="btn-search-inner" id="search-btn">
          <img src="/assets/images/Search.svg" alt="Search">
        </button>
      </div>
    </div>
    <section class="library-section">
      <h2 class="title-sm section-title" id="search-title">For You</h2>
      <div class="music-grid" id="search-results"></div>
    </section>
  </main>
  <footer class="player-container">
    {{/components/player.html}}
  </footer>
</div>
<script src="/js/script.js"></script>
</body>
</html>
