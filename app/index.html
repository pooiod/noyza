<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noyza - Structured Serenity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link id="theme-stylesheet" rel="stylesheet" href="/css/theme-light-1.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar-container">
    {{/components/sidebar.html}}
  </aside>
  <main class="main-content">
    <header class="top-header">
      <h1 class="headline-md">Good Evening, Listener</h1>
      <button id="theme-toggle" class="btn-secondary chip">
        <div class="icon" style="-webkit-mask-image: url('/icons/theme.svg'); mask-image: url('/icons/theme.svg');"></div>
        <span class="label-caps">Change Theme</span>
      </button>
    </header>
    <section class="library-section">
      <h2 class="title-sm section-title">Curated For You</h2>
      <div class="music-grid">
        <div class="album-card bg-pastel-1">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Midnight Lo-Fi</h3>
            <p class="label-caps">Various Artists</p>
          </div>
        </div>
        <div class="album-card bg-pastel-2">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Acoustic Serenity</h3>
            <p class="label-caps">Noyza Originals</p>
          </div>
        </div>
        <div class="album-card bg-pastel-3">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Electronic Focus</h3>
            <p class="label-caps">Brainwaves</p>
          </div>
        </div>
        <div class="album-card bg-pastel-4">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Jazz Essentials</h3>
            <p class="label-caps">Curated Selection</p>
          </div>
        </div>
        <div class="album-card bg-pastel-1">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Deep House</h3>
            <p class="label-caps">Rhythm</p>
          </div>
        </div>
        <div class="album-card bg-pastel-2">
          <div class="album-art"></div>
          <div class="album-info">
            <h3 class="title-sm">Classical Morning</h3>
            <p class="label-caps">Symphony</p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="player-container">
    {{/components/player.html}}
  </footer>
</div>
<script src="/js/script.js"></script>
</body>
</html>
