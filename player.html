<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{background:#222;display:flex;height:100vh;justify-content:center;align-items:center;margin:0}
.player{background:#4a4a4a;border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;width:600px;gap:20px}
.controls{display:flex;align-items:center;gap:15px;width:100%}
.controls i{color:#fff;font-size:24px;cursor:pointer}
.title{color:#fff;font-family:monospace;letter-spacing:8px;flex-grow:1;text-align:center}
.progress input{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:#777;outline:none}
.progress input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#0af;cursor:ew-resize}
.bottom{display:flex;align-items:center;justify-content:flex-end;width:100%}
.volume input{transform:rotate(270deg);-webkit-appearance:none;width:100px;height:6px;border-radius:3px;background:#777;outline:none}
.volume input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#0af;cursor:ns-resize}
</style>
</head>
<body>
<div class="player">
  <div class="controls">
    <i class="fa-solid fa-backward-step"></i>
    <i class="fa-solid fa-play"></i>
    <i class="fa-solid fa-forward-step"></i>
    <i class="fa-solid fa-shuffle"></i>
    <div class="title">[KARLSONVIBE]</div>
    <i class="fa-solid fa-bars"></i>
  </div>
  <div class="progress"><input type="range" value="20"></div>
  <div class="bottom"><div class="volume"><input type="range" value="60"></div></div>
</div>
</body>
</html>
