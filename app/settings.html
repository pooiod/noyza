<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noyza - Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link id="theme-stylesheet" rel="stylesheet" href="/themes/serenity.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body data-theme-mode="light">
<div class="app-layout">
  <aside class="sidebar-container">
    {{/components/sidebar.html}}
  </aside>
  <main class="main-content">
    <header class="top-header">
      <h1 class="headline-md">Settings</h1>
    </header>
    <section class="settings-section">
      <div class="settings-card bg-pastel-1">
        <h2 class="title-sm">Appearance</h2>
        <div class="settings-group">
          <label class="label-caps" for="theme-select">Theme</label>
          <select id="theme-select" class="custom-select">
            <option value="serenity">Serenity</option>
            <option value="midnight">Midnight</option>
            <option value="forest">Forest</option>
            <option value="sunset">Sunset</option>
            <option value="ocean">Ocean</option>
          </select>
        </div>
        <div class="settings-group">
          <label class="label-caps" for="mode-select">Mode</label>
          <select id="mode-select" class="custom-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </div>

      <div class="settings-card bg-pastel-3">
        <h2 class="title-sm">System & Updates</h2>
        <div class="settings-group" style="flex-direction: row; align-items: center; justify-content: space-between; display: flex;">
          <label class="label-caps" for="update-check-toggle">Enable Automatic Updates</label>
          <input type="checkbox" id="update-check-toggle" class="custom-checkbox">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <button class="btn-primary" id="btn-update-now">Update Now</button>
          <button class="btn-primary" id="btn-custom-build">Use Custom Build</button>
          <input type="file" id="custom-build-input" accept=".zip" style="display: none;">
        </div>
      </div>

      <div class="settings-card bg-pastel-4">
        <h2 class="title-sm">Storage & Offline Cache</h2>
        <div class="settings-group">
          <label class="label-caps" for="input-offline-cache">Offline Cache Limit (Tracks)</label>
          <input type="number" id="input-offline-cache" class="custom-input" min="0" value="30">
        </div>
        <div class="settings-group" style="margin-top: 15px;">
          <label class="label-caps" for="input-top-cache">Top Songs Cache Limit (Tracks)</label>
          <input type="number" id="input-top-cache" class="custom-input" min="0" value="5">
        </div>
      </div>

      <div class="settings-card bg-pastel-2">
        <h2 class="title-sm">Plugins Manager</h2>
        <div class="settings-group">
          <label class="label-caps" for="plugin-url-input">Install Plugin from URL</label>
          <div style="display: flex; gap: 10px;">
            <input type="text" id="plugin-url-input" class="custom-input" placeholder="https://example.com/plugin.js" style="flex: 1;">
            <button class="btn-primary" id="btn-install-plugin">Install</button>
          </div>
        </div>
        <div class="settings-group" style="margin-top: 20px;">
          <label class="label-caps">Installed Plugins</label>
          <div id="installed-plugins-list" class="plugins-list"></div>
        </div>
      </div>
    </section>
  </main>
  <footer class="player-container">
    {{/components/player.html}}
  </footer>
</div>
<script src="/js/script.js"></script>
</body>
</html>
