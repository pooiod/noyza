<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noyza - Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link id="theme-stylesheet" rel="stylesheet" href="/themes/serenity.css">
</head>
<body data-theme-mode="light">
<div class="app-layout">
  <aside class="sidebar-container">
    {{/components/sidebar.html}}
  </aside>
  <main class="main-content">
    <header class="top-header">
      <h1 class="headline-md">Good Evening</h1>
    </header>
    
    <section class="library-section">
      <h2 class="title-sm section-title">Curated For You</h2>
      <div class="carousel-wrapper">
        <button class="btn-scroll btn-scroll-left"><img src="/assets/images/player/Previous.svg" alt="Left"></button>
        <div class="music-grid" id="grid-foryou"></div>
        <button class="btn-scroll btn-scroll-right"><img src="/assets/images/player/Next.svg" alt="Right"></button>
      </div>
    </section>

    <section class="library-section">
      <h2 class="title-sm section-title">Trending Now</h2>
      <div class="carousel-wrapper">
        <button class="btn-scroll btn-scroll-left"><img src="/assets/images/player/Previous.svg" alt="Left"></button>
        <div class="music-grid" id="grid-trending"></div>
        <button class="btn-scroll btn-scroll-right"><img src="/assets/images/player/Next.svg" alt="Right"></button>
      </div>
    </section>

    <section class="library-section">
      <h2 class="title-sm section-title">Latest Releases</h2>
      <div class="carousel-wrapper">
        <button class="btn-scroll btn-scroll-left"><img src="/assets/images/player/Previous.svg" alt="Left"></button>
        <div class="music-grid" id="grid-latest"></div>
        <button class="btn-scroll btn-scroll-right"><img src="/assets/images/player/Next.svg" alt="Right"></button>
      </div>
    </section>

  </main>
  <footer class="player-container">
    {{/components/player.html}}
  </footer>
</div>
<script src="/js/script.js"></script>
<script src="/plugins/ArchiveCH.js"></script>
</body>
</html>
